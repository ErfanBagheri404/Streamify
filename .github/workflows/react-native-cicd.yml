name: React Native CI/CD

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "docs/**"
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      buildType:
        type: choice
        description: "Build type to run"
        options:
          - prod-apk # <-- changed from 'dev'
          - all

permissions:
  contents: write

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
  NODE_OPTIONS: --openssl-legacy-provider

jobs:
  check-skip:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Skip CI check
        run: echo "Proceeding with workflow"

  build-and-deploy:
    needs: check-skip
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: android-release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install dependencies
        run: |
          set -euo pipefail
          npm ci --include=dev
          npm install -g eas-cli@latest

      - name: 📱 Setup EAS build cache
        uses: actions/cache@v4
        with:
          path: ~/.eas-build-local
          key: ${{ runner.os }}-eas-build-local-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-eas-build-local-

      - name: 🔄 Verify EAS CLI installation
        run: |
          set -euo pipefail
          echo "EAS CLI version:"
          eas --version

      - name: 📋 Fix package.json main entry
        run: |
          set -euo pipefail
          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi
          cp package.json package.json.bak
          jq '.main = "node_modules/expo/AppEntry.js"' package.json > package.json.tmp && mv package.json.tmp package.json
          cat package.json | grep "main"

      - name: 📋 Update metro.config.js for SVG support
        run: |
          set -euo pipefail
          if [ -f ./metro.config.js ]; then
            cp ./metro.config.js ./metro.config.js.backup
            cat > ./metro.config.js << 'EOFMARKER'
          /* eslint-disable @typescript-eslint/no-var-requires */
          const { getDefaultConfig } = require('expo/metro-config');
          const config = getDefaultConfig(__dirname);
          const { transformer, resolver } = config;
          config.transformer = {
            ...transformer,
            babelTransformerPath: require.resolve('react-native-svg-transformer/expo'),
          };
          config.resolver = {
            ...resolver,
            assetExts: resolver.assetExts.filter(ext => ext !== 'svg'),
            sourceExts: [...resolver.sourceExts, 'svg'],
          };
          module.exports = config;
          EOFMARKER
          fi

      - name: 🔐 Write public production env
        run: |
          set -euo pipefail

          required_vars=(
            EXPO_PUBLIC_SUPABASE_URL
            EXPO_PUBLIC_SUPABASE_ANON_KEY
          )

          missing_vars=()
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              missing_vars+=("$var_name")
            fi
          done

          if [ "${#missing_vars[@]}" -gt 0 ]; then
            echo "Missing required public production env vars: ${missing_vars[*]}" >&2
            exit 1
          fi

          rm -f .env.production
          {
            echo "EXPO_PUBLIC_SUPABASE_URL=${EXPO_PUBLIC_SUPABASE_URL}"
            echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${EXPO_PUBLIC_SUPABASE_ANON_KEY}"
          } > .env.production

          sed 's/=.*/=[secure]/' .env.production
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: 🏷 Resolve Expo version and release metadata
        id: release_meta
        run: |
          set -euo pipefail
          mkdir -p build-artifacts
          npx expo config --json > build-artifacts/expo-config.json
          node <<'NODE'
          const fs = require("fs");
          const outputPath = process.env.GITHUB_OUTPUT;
          const raw = fs.readFileSync("build-artifacts/expo-config.json", "utf8").trim();
          if (!raw) {
            throw new Error("Resolved Expo config output is empty.");
          }

          const parsed = JSON.parse(raw);
          const expoConfig = parsed?.expo ?? parsed;
          const version = String(expoConfig?.version ?? "").trim();
          if (!version) {
            throw new Error(
              "Expo config version is missing. Add expo.version to app.json or app.config.*."
            );
          }

          const appName = String(expoConfig?.name ?? "Streamify").trim() || "Streamify";
          const slug = String(expoConfig?.slug ?? "streamify-mobile").trim() || "streamify-mobile";

          fs.appendFileSync(outputPath, `app_name=${appName}\n`);
          fs.appendFileSync(outputPath, `app_slug=${slug}\n`);
          fs.appendFileSync(outputPath, `app_version=${version}\n`);
          NODE

      # ----------------------------------------------------------
      #  PREBUILD - Generate native Android files
      # ----------------------------------------------------------
      - name: 🏗 Run Prebuild (Generate Android files)
        run: |
          set -euo pipefail
          echo "Running prebuild to generate Android directory..."
          npx expo prebuild --platform android --clean

      # ----------------------------------------------------------
      #  PRODUCTION build (standalone, offline, no Metro required)
      # ----------------------------------------------------------

      - name: 📱 Start Production APK build
        id: eas_build_start
        if: >
          (github.event.inputs.buildType == 'all' || github.event.inputs.buildType == 'prod-apk' || github.event_name == 'push')
          && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          set -euo pipefail
          export NODE_OPTIONS="--openssl-legacy-provider --max_old_space_size=4096"

          mkdir -p build-artifacts

          # Use EAS cloud build for production APK (works on all platforms)
          echo "Starting production APK build using EAS cloud build..."

          # Start the build first so we always capture the EAS build ID,
          # even when the remote build later errors without rich logs.
          eas build --platform android --profile production-apk --non-interactive --no-wait --json > build-artifacts/eas-build-result.json
          test -s build-artifacts/eas-build-result.json
        env:
          NODE_ENV: production

      - name: 🧾 Extract EAS build info
        id: eas_build_info
        if: steps.eas_build_start.outcome == 'success'
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("fs");
          const outputPath = process.env.GITHUB_OUTPUT;
          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const raw = fs.readFileSync("build-artifacts/eas-build-result.json", "utf8").trim();
          if (!raw) {
            throw new Error("EAS build JSON output is empty.");
          }

          const parsed = JSON.parse(raw);
          const build = Array.isArray(parsed) ? parsed[0] : parsed;
          const buildId =
            build?.id ||
            build?.buildId ||
            build?.build?.id ||
            "";
          const status = String(build?.status || build?.build?.status || "").trim().toUpperCase();
          const buildDetailsUrl =
            build?.buildDetailsUrl ||
            build?.detailsPageUrl ||
            build?.webUrl ||
            build?.build?.buildDetailsUrl ||
            "";

          if (!buildId) {
            throw new Error("Could not determine the EAS build ID from eas build --json output.");
          }

          fs.appendFileSync(outputPath, `build_id=${buildId}\n`);
          if (status) {
            fs.appendFileSync(outputPath, `initial_status=${status}\n`);
          }
          if (buildDetailsUrl) {
            fs.appendFileSync(outputPath, `build_details_url=${buildDetailsUrl}\n`);
          }

          const lines = [
            "### EAS build started",
            `- Build ID: \`${buildId}\``,
          ];
          if (status) {
            lines.push(`- Initial Status: \`${status}\``);
          }
          if (buildDetailsUrl) {
            lines.push(`- Details: ${buildDetailsUrl}`);
          }
          fs.appendFileSync(summaryPath, `${lines.join("\n")}\n`);
          NODE

      - name: ⏳ Wait for EAS build completion
        id: eas_build_wait
        if: steps.eas_build_info.outcome == 'success'
        continue-on-error: true
        run: |
          set -euo pipefail
          BUILD_ID="${{ steps.eas_build_info.outputs.build_id }}"
          MAX_ATTEMPTS=120
          SLEEP_SECONDS=15

          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            VIEW_EXIT_CODE=0
            eas build:view "$BUILD_ID" --json > build-artifacts/eas-build-view.json 2> build-artifacts/eas-build-view.stderr || VIEW_EXIT_CODE=$?

            if [ "$VIEW_EXIT_CODE" -ne 0 ]; then
              echo "Attempt $attempt/$MAX_ATTEMPTS: failed to fetch EAS build status."
              if [ -s build-artifacts/eas-build-view.stderr ]; then
                cat build-artifacts/eas-build-view.stderr
              fi
              sleep "$SLEEP_SECONDS"
              continue
            fi

            STATUS="$(node <<'NODE'
          const fs = require("fs");
          const raw = fs.readFileSync("build-artifacts/eas-build-view.json", "utf8").trim();
          if (!raw) {
            process.stdout.write("UNKNOWN");
            process.exit(0);
          }
          const parsed = JSON.parse(raw);
          const build = Array.isArray(parsed) ? parsed[0] : parsed;
          const status = String(build?.status || build?.build?.status || "UNKNOWN").trim().toUpperCase();
          process.stdout.write(status || "UNKNOWN");
          NODE
            )"

            echo "Attempt $attempt/$MAX_ATTEMPTS: EAS build status is $STATUS"

            case "$STATUS" in
              FINISHED|COMPLETED)
                exit 0
                ;;
              ERRORED|FAILED|CANCELED|CANCELLED)
                exit 1
                ;;
            esac

            sleep "$SLEEP_SECONDS"
          done

          echo "Timed out while waiting for EAS build completion."
          exit 1

      - name: 🔍 Fetch final EAS build details
        if: always() && steps.eas_build_info.outcome == 'success'
        run: |
          set -euo pipefail
          BUILD_ID="${{ steps.eas_build_info.outputs.build_id }}"
          VIEW_EXIT_CODE=0
          eas build:view "$BUILD_ID" --json > build-artifacts/eas-build-view.json 2> build-artifacts/eas-build-view.stderr || VIEW_EXIT_CODE=$?
          if [ "$VIEW_EXIT_CODE" -ne 0 ]; then
            echo "Final EAS build detail fetch failed for build $BUILD_ID."
            if [ -s build-artifacts/eas-build-view.stderr ]; then
              cat build-artifacts/eas-build-view.stderr
            fi
          fi

      - name: 🚨 Summarize EAS build failure
        if: always() && steps.eas_build_info.outcome == 'success' && steps.eas_build_wait.outcome != 'success'
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("fs");

          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const files = [
            "build-artifacts/eas-build-view.json",
            "build-artifacts/eas-build-result.json",
          ].filter((file) => fs.existsSync(file));

          const candidates = [];
          for (const file of files) {
            const raw = fs.readFileSync(file, "utf8").trim();
            if (!raw) continue;
            const parsed = JSON.parse(raw);
            const root = Array.isArray(parsed) ? parsed[0] : parsed;
            if (!root || typeof root !== "object") continue;
            candidates.push(root);
            if (root.build && typeof root.build === "object") {
              candidates.push(root.build);
            }
          }

          function firstNonEmpty(values) {
            for (const value of values) {
              if (value === undefined || value === null) continue;
              const normalized = String(value).trim();
              if (normalized) return normalized;
            }
            return "";
          }

          const status = firstNonEmpty(candidates.map((entry) => entry.status)).toUpperCase() || "ERRORED";
          const buildId = firstNonEmpty([
            ...candidates.map((entry) => entry.id),
            ...candidates.map((entry) => entry.buildId),
          ]);
          const detailsUrl = firstNonEmpty([
            ...candidates.map((entry) => entry.buildDetailsUrl),
            ...candidates.map((entry) => entry.detailsPageUrl),
            ...candidates.map((entry) => entry.webUrl),
            ...candidates.map((entry) => entry.logsUrl),
          ]);
          const logFileUrl = firstNonEmpty(
            candidates.flatMap((entry) =>
              Array.isArray(entry.logFiles) ? entry.logFiles : []
            )
          ).replace(/^["'\s`]+|["'\s`]+$/g, "");
          const errorCode = firstNonEmpty([
            ...candidates.map((entry) => entry.errorCode),
            ...candidates.map((entry) => entry.error?.errorCode),
            ...candidates.map((entry) => entry.error?.code),
          ]);
          const errorMessage = firstNonEmpty([
            ...candidates.map((entry) => entry.message),
            ...candidates.map((entry) => entry.error?.message),
            ...candidates.map((entry) => entry.error),
            ...candidates.map((entry) => entry.errorMessage),
            ...candidates.map((entry) => entry.reason),
          ]);

          const lines = [
            "### EAS build failed",
            `- Status: \`${status}\``,
          ];

          if (buildId) {
            lines.push(`- Build ID: \`${buildId}\``);
          }
          if (detailsUrl) {
            lines.push(`- Details: ${detailsUrl}`);
          }
          if (logFileUrl) {
            lines.push(`- Log File: ${logFileUrl}`);
          }
          if (errorCode) {
            lines.push(`- Error Code: \`${errorCode}\``);
          }
          if (errorMessage) {
            lines.push(`- Error: ${errorMessage}`);
          }

          fs.appendFileSync(summaryPath, `${lines.join("\n")}\n`);
          console.error(lines.join("\n"));
          NODE

      - name: 🏷 Resolve release identity
        id: release_identity
        if: steps.eas_build_wait.outcome == 'success'
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("fs");

          const outputPath = process.env.GITHUB_OUTPUT;
          const baseVersion = String(process.env.BASE_APP_VERSION || "").trim();
          const runNumber = String(process.env.GITHUB_RUN_NUMBER || "").trim();
          const files = [
            "build-artifacts/eas-build-view.json",
            "build-artifacts/eas-build-result.json",
          ].filter((file) => fs.existsSync(file));

          const candidates = [];

          for (const file of files) {
            const raw = fs.readFileSync(file, "utf8").trim();
            if (!raw) {
              continue;
            }
            const parsed = JSON.parse(raw);
            const root = Array.isArray(parsed) ? parsed[0] : parsed;
            if (!root || typeof root !== "object") {
              continue;
            }
            candidates.push(root);
            if (root.build && typeof root.build === "object") {
              candidates.push(root.build);
            }
            if (root.metadata && typeof root.metadata === "object") {
              candidates.push(root.metadata);
            }
          }

          function firstNonEmpty(values) {
            for (const value of values) {
              if (value === undefined || value === null) {
                continue;
              }
              const normalized = String(value).trim();
              if (normalized) {
                return normalized;
              }
            }
            return "";
          }

          const appVersion =
            firstNonEmpty(candidates.map((entry) => entry.appVersion)) || baseVersion;

          if (!appVersion) {
            throw new Error("Unable to determine the app version for release naming.");
          }

          const appBuildVersion = firstNonEmpty([
            ...candidates.map((entry) => entry.appBuildVersion),
            ...candidates.map((entry) => entry.versionCode),
            ...candidates.map((entry) => entry.androidVersionCode),
            ...candidates.map((entry) => entry.buildNumber),
            ...candidates
              .map((entry) => entry.buildVersion)
              .filter((value) => String(value ?? "").trim() !== appVersion),
          ]);

          const sanitizedBuildVersion = appBuildVersion.replace(/[^0-9A-Za-z._-]+/g, "-");
          const releaseTag = `v${appVersion}`;
          const apkName = `Streamify-v${appVersion}.apk`;
          const changelogName = `CHANGELOG-${releaseTag}.md`;
          const metadataName = `release-metadata-${releaseTag}.json`;

          fs.appendFileSync(outputPath, `resolved_app_version=${appVersion}\n`);
          fs.appendFileSync(outputPath, `app_build_version=${sanitizedBuildVersion}\n`);
          fs.appendFileSync(outputPath, `release_tag=${releaseTag}\n`);
          fs.appendFileSync(outputPath, `apk_name=${apkName}\n`);
          fs.appendFileSync(outputPath, `changelog_name=${changelogName}\n`);
          fs.appendFileSync(outputPath, `metadata_name=${metadataName}\n`);
          NODE
        env:
          BASE_APP_VERSION: ${{ steps.release_meta.outputs.app_version }}

      - name: 🔗 Resolve EAS artifact URLs
        id: eas_artifacts
        if: steps.eas_build_wait.outcome == 'success'
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const outputPath = process.env.GITHUB_OUTPUT;
          const files = [
            "build-artifacts/eas-build-result.json",
            "build-artifacts/eas-build-view.json",
          ].filter((file) => fs.existsSync(file));

          const urlSet = new Set();

          function collectUrls(value) {
            if (!value) {
              return;
            }
            if (typeof value === "string") {
              const trimmed = value.trim();
              if (/^https?:\/\//i.test(trimmed)) {
                urlSet.add(trimmed);
              }
              return;
            }
            if (Array.isArray(value)) {
              for (const entry of value) {
                collectUrls(entry);
              }
              return;
            }
            if (typeof value === "object") {
              for (const nestedValue of Object.values(value)) {
                collectUrls(nestedValue);
              }
            }
          }

          for (const file of files) {
            const raw = fs.readFileSync(file, "utf8").trim();
            if (!raw) {
              continue;
            }
            collectUrls(JSON.parse(raw));
          }

          const urls = [...urlSet];
          fs.writeFileSync("build-artifacts/discovered-urls.txt", urls.join("\n"));

          const artifactUrl =
            urls.find((url) => /\.apk(?:$|[?#])/i.test(url)) ||
            urls.find(
              (url) =>
                /\/artifacts\//i.test(url) &&
                !/\.(json|txt|log)(?:$|[?#])/i.test(url)
            ) ||
            "";

          if (!artifactUrl) {
            throw new Error(
              `Could not find an APK artifact URL in the EAS build metadata. URLs discovered: ${urls.join(", ")}`
            );
          }

          const extraAssetUrls = urls.filter(
            (url) =>
              url !== artifactUrl &&
              /(mapping|proguard|symbols?)/i.test(url)
          );

          fs.writeFileSync(
            "build-artifacts/additional-asset-urls.txt",
            extraAssetUrls.join("\n")
          );

          fs.appendFileSync(outputPath, `artifact_url=${artifactUrl}\n`);
          fs.appendFileSync(
            outputPath,
            `has_additional_assets=${extraAssetUrls.length > 0 ? "true" : "false"}\n`
          );
          NODE

      - name: 📥 Download APK from EAS
        if: steps.eas_artifacts.outcome == 'success'
        run: |
          set -euo pipefail
          curl -fL --retry 3 --retry-delay 5 "${{ steps.eas_artifacts.outputs.artifact_url }}" -o "build-artifacts/${{ steps.release_identity.outputs.apk_name }}"
          test -s "build-artifacts/${{ steps.release_identity.outputs.apk_name }}"

      - name: 📥 Download additional release artifacts
        if: steps.eas_artifacts.outcome == 'success'
        run: |
          set -euo pipefail
          if [ ! -s build-artifacts/additional-asset-urls.txt ]; then
            echo "No extra mapping or symbol artifacts were exposed by the EAS build metadata."
            exit 0
          fi

          while IFS= read -r url; do
            [ -n "$url" ] || continue
            filename="$(basename "${url%%\?*}")"
            safe_name="$(echo "$filename" | tr -cd '[:alnum:]._-' )"
            if [ -z "$safe_name" ]; then
              safe_name="extra-artifact-$(date +%s)"
            fi
            curl -fL --retry 3 --retry-delay 5 "$url" -o "build-artifacts/$safe_name"
          done < build-artifacts/additional-asset-urls.txt

      - name: 📝 Generate changelog and release metadata
        if: steps.eas_artifacts.outcome == 'success'
        run: |
          set -euo pipefail

          VERSION="${{ steps.release_identity.outputs.resolved_app_version }}"
          BUILD_VERSION="${{ steps.release_identity.outputs.app_build_version }}"
          TAG="${{ steps.release_identity.outputs.release_tag }}"
          CHANGELOG_FILE="build-artifacts/${{ steps.release_identity.outputs.changelog_name }}"
          PREVIOUS_TAG="$(git tag --sort=-v:refname | grep -Fvx "${TAG}" | head -n 1 || true)"

          {
            echo "# Streamify ${TAG}"
            echo
            echo "- Automated Android APK release from GitHub Actions."
            echo "- App Version: \`${VERSION}\`"
            if [ -n "${BUILD_VERSION}" ]; then
              echo "- Android Build Version: \`${BUILD_VERSION}\`"
            fi
            echo "- Tag: \`${TAG}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- EAS Build ID: \`${{ steps.eas_build_info.outputs.build_id }}\`"
            if [ -n "${{ steps.eas_build_info.outputs.build_details_url }}" ]; then
              echo "- EAS Build Details: ${{ steps.eas_build_info.outputs.build_details_url }}"
            fi
            echo
            echo "## Changes"
            if [ -n "$PREVIOUS_TAG" ]; then
              git log --pretty=format:'- %s (%h)' "${PREVIOUS_TAG}..${GITHUB_SHA}"
            else
              git log -n 20 --pretty=format:'- %s (%h)'
            fi
          } > "${CHANGELOG_FILE}"

          node <<'NODE'
          const fs = require("fs");

          const version = process.env.APP_VERSION;
          const buildVersion = process.env.APP_BUILD_VERSION || null;
          const releaseTag = process.env.RELEASE_TAG;
          const buildId = process.env.EAS_BUILD_ID;
          const artifactUrl = process.env.EAS_ARTIFACT_URL;
          const detailsUrl = process.env.EAS_BUILD_DETAILS_URL;

          const metadata = {
            appName: "Streamify",
            version,
            releaseTag,
            gitSha: process.env.GITHUB_SHA,
            gitRef: process.env.GITHUB_REF,
            runId: process.env.GITHUB_RUN_ID,
            runNumber: process.env.GITHUB_RUN_NUMBER,
            repository: process.env.GITHUB_REPOSITORY,
            workflow: process.env.GITHUB_WORKFLOW,
            runUrl: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            eas: {
              buildId,
              appBuildVersion: buildVersion,
              artifactUrl,
              buildDetailsUrl: detailsUrl || null,
            },
            generatedAt: new Date().toISOString(),
          };

          fs.writeFileSync(
            `build-artifacts/${process.env.METADATA_NAME}`,
            `${JSON.stringify(metadata, null, 2)}\n`
          );
          NODE
        env:
          APP_VERSION: ${{ steps.release_identity.outputs.resolved_app_version }}
          APP_BUILD_VERSION: ${{ steps.release_identity.outputs.app_build_version }}
          RELEASE_TAG: ${{ steps.release_identity.outputs.release_tag }}
          METADATA_NAME: ${{ steps.release_identity.outputs.metadata_name }}
          EAS_BUILD_ID: ${{ steps.eas_build_info.outputs.build_id }}
          EAS_ARTIFACT_URL: ${{ steps.eas_artifacts.outputs.artifact_url }}
          EAS_BUILD_DETAILS_URL: ${{ steps.eas_build_info.outputs.build_details_url }}

      - name: 🚀 Create or update GitHub Release
        if: steps.eas_artifacts.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          VERSION="${{ steps.release_identity.outputs.resolved_app_version }}"
          TAG="${{ steps.release_identity.outputs.release_tag }}"
          TITLE="Streamify ${TAG}"
          NOTES_FILE="build-artifacts/${{ steps.release_identity.outputs.changelog_name }}"

          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Updating existing release ${TAG}"
            gh release edit "${TAG}" --title "${TITLE}" --notes-file "${NOTES_FILE}"
          else
            echo "Creating release ${TAG}"
            gh release create "${TAG}" --title "${TITLE}" --notes-file "${NOTES_FILE}" --target "${GITHUB_SHA}"
          fi

          assets=(
            "build-artifacts/${{ steps.release_identity.outputs.apk_name }}"
          )

          gh release upload "${TAG}" "${assets[@]}" --clobber

      - name: 📋 Release summary
        if: steps.eas_artifacts.outcome == 'success'
        run: |
          set -euo pipefail
          {
            echo "### Release published"
            echo "- Version: \`${{ steps.release_identity.outputs.resolved_app_version }}\`"
            if [ -n "${{ steps.release_identity.outputs.app_build_version }}" ]; then
              echo "- Android Build Version: \`${{ steps.release_identity.outputs.app_build_version }}\`"
            fi
            echo "- Tag: \`${{ steps.release_identity.outputs.release_tag }}\`"
            echo "- APK: \`${{ steps.release_identity.outputs.apk_name }}\`"
            echo "- EAS Build ID: \`${{ steps.eas_build_info.outputs.build_id }}\`"
            echo "- Release URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.release_identity.outputs.release_tag }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 📦 Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-release-assets
          path: ./build-artifacts/**/*
          if-no-files-found: warn
          retention-days: 7

      - name: 🔍 Print Gradle log (if failed)
        if: failure()
        run: |
          set -euo pipefail
          LOG=$(ls -t ./logs/*.log 2>/dev/null | head -n1)
          if [ -f "$LOG" ]; then cat "$LOG"; else echo "No gradle log found"; fi

      - name: ❌ Fail workflow when EAS build fails
        if: always() && steps.eas_build_info.outcome == 'success' && steps.eas_build_wait.outcome != 'success'
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("fs");

          if (!fs.existsSync("build-artifacts/eas-build-view.json")) {
            console.error("No final EAS build JSON was captured.");
            process.exit(1);
          }

          const raw = fs.readFileSync("build-artifacts/eas-build-view.json", "utf8").trim();
          const parsed = JSON.parse(raw);
          const build = Array.isArray(parsed) ? parsed[0] : parsed;

          const buildId = String(build?.id || build?.buildId || "").trim();
          const detailsUrl = String(
            build?.buildDetailsUrl || build?.detailsPageUrl || build?.webUrl || ""
          ).trim();
          const errorCode = String(
            build?.error?.errorCode || build?.errorCode || build?.error?.code || ""
          ).trim();
          const errorMessage = String(
            build?.error?.message || build?.message || build?.errorMessage || build?.reason || ""
          ).trim();
          const logFileUrl = Array.isArray(build?.logFiles)
            ? String(build.logFiles[0] || "").trim().replace(/^["'\s`]+|["'\s`]+$/g, "")
            : "";

          console.error(`EAS build failed for build ID ${buildId || "unknown"}`);
          if (detailsUrl) {
            console.error(`Details: ${detailsUrl}`);
          }
          if (logFileUrl) {
            console.error(`Log File: ${logFileUrl}`);
          }
          if (errorCode) {
            console.error(`Error Code: ${errorCode}`);
          }
          if (errorMessage) {
            console.error(`Error: ${errorMessage}`);
          }
          console.error(JSON.stringify(build, null, 2));
          process.exit(1);
          NODE
          exit 1
